# ld65 linker configuration for Jeopardy! 25th Anniversary Edition (NES).
#
# Encodes the verified image layout (see docs/mapper.md): iNES header +
# four 32 KB AOROM PRG banks, 8 KB CHR-RAM (no CHR-ROM). This is correct,
# reusable groundwork for reassembly; the matching ca65 .asm sources are
# the next milestone (the engine in bank 0 is mapped in docs/; banks 1-3
# are mostly Huffman clue data, see Jeopardy/SCRIPT_FORMAT_NOTES.md).
#
# Reassembly is not yet byte-verified end-to-end because cc65 is not
# installed in this environment. When it is:
#     ca65 src/jeopardy.s -o build/jeopardy.o
#     ld65 -C src/jeopardy.cfg build/jeopardy.o -o build/jeopardy.nes
#     python tools/verify.py build/jeopardy.nes   # must print MATCH

MEMORY {
    # 16-byte iNES header (mapper 7, 8x16KB PRG, 0 CHR, single-screen).
    HEADER:  start=$0000, size=$0010, fill=yes, fillval=$00, file=%O;

    # Each AOROM bank fills the full $8000-$FFFF window when mapped in.
    # All four share RESET ($FF94) and the trampoline tail; each carries
    # its own NMI/IRQ vectors at $FFFA.
    BANK0:   start=$8000, size=$8000, fill=yes, fillval=$FF, file=%O;
    BANK1:   start=$8000, size=$8000, fill=yes, fillval=$FF, file=%O;
    BANK2:   start=$8000, size=$8000, fill=yes, fillval=$FF, file=%O;
    BANK3:   start=$8000, size=$8000, fill=yes, fillval=$FF, file=%O;
    # CHR-RAM: 8 KB, uploaded from PRG at runtime; nothing to link here.
}

SEGMENTS {
    INESHDR:  load=HEADER, type=ro;

    # Bank 0 = the engine/home bank. CODE0 holds the main code; VEC0 the
    # NMI/RESET/IRQ words pinned to the bank tail.
    CODE0:    load=BANK0, type=ro,  start=$8000;
    VEC0:     load=BANK0, type=ro,  start=$FFFA;

    CODE1:    load=BANK1, type=ro,  start=$8000;
    VEC1:     load=BANK1, type=ro,  start=$FFFA;

    CODE2:    load=BANK2, type=ro,  start=$8000;
    VEC2:     load=BANK2, type=ro,  start=$FFFA;

    CODE3:    load=BANK3, type=ro,  start=$8000;
    VEC3:     load=BANK3, type=ro,  start=$FFFA;
}
